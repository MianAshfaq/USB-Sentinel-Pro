name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      SIGNING_CERTIFICATE: ${{ secrets.CODE_SIGNING_CERTIFICATE_BASE64 }}
      SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build release
        shell: powershell
        run: .\scripts\build.ps1
      - name: Sign release artifacts
        if: ${{ env.SIGNING_CERTIFICATE != '' }}
        shell: powershell
        run: .\scripts\sign-release.ps1 -CertificateBase64 $env:SIGNING_CERTIFICATE -CertificatePassword $env:SIGNING_PASSWORD
      - name: Publish GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" artifacts/installer/USB-Sentinel-Pro-Setup.msi --generate-notes --title "USB Sentinel Pro ${{ github.ref_name }}"
